<template>
    <lightning-card>

        <!-- Header -->
        <div class="slds-p-around_small">
            <div class="slds-text-heading_small">
                <b>Line Items</b>
            </div>
            <div class="slds-m-vertical_small">
                {totalLineItems} items
            </div>
        </div>

        <!-- Table Wrapper -->
        <div class="table-wrapper">
            <table class="resizable-table" data-id="mainTable">

                <!-- Column Width Definitions - DYNAMIC -->
                <colgroup>
                    <!-- Serial Number Column -->
                    <col data-col="0"  style="width: 50px"/>
                    
                    <!-- Dynamic Columns from FieldSet -->
                    <template for:each={columns} for:item="column" for:index="colIndex">
                        <col key={column.apiName} data-col={colIndex + 1} style="width: 130px"/>
                    </template>
                </colgroup>

                <!-- Table Header - DYNAMIC -->
                <thead>
                    <tr class="slds-line-height_reset">

                        <!-- Serial Number Header -->
                        <th scope="col" data-col-index="0">
                            <div class="th-content" title="#">#</div>
                            <div class="col-resizer" data-col-index="0"></div>
                        </th>

                        <!-- Dynamic Column Headers -->
                        <template for:each={columns} for:item="column" for:index="colIndex">
                            <th key={column.apiName} scope="col" data-col-index={colIndex + 1}>
                                <div class="th-content" title={column.label}>{column.label}</div>
                                <div class="col-resizer" data-col-index={colIndex + 1}></div>
                            </th>
                        </template>

                    </tr>
                </thead>

                <tbody>
                    <!-- Dynamic Data Rows -->
                    <template for:each={data} for:item="row">
                        <tr key={row.Id} class="slds-hint-parent">

                            <!-- Serial Number Cell -->
                            <td title={row.serialNumber}>
                                {row.serialNumber}
                            </td>

                            <!-- Dynamic Data Cells -->
                            <template for:each={columns} for:item="column">
                                <template if:true={column.isReference}>
                                    <!-- Reference Field - Show as Link -->
                                    <td key={column.apiName} title={getCellValue(row, column.apiName)}>
                                        <template if:true={getCellUrl(row, column.apiName)}>
                                            <a href={getCellUrl(row, column.apiName)} target="_blank">{getCellValue(row, column.apiName)}</a>
                                        </template>
                                        <template if:false={getCellUrl(row, column.apiName)}>
                                            <template if:true={getCellValue(row, column.apiName)}>
                                                {getCellValue(row, column.apiName)}
                                            </template>
                                            <template if:false={getCellValue(row, column.apiName)}>-</template>
                                        </template>
                                    </td>
                                </template>

                                <template if:false={column.isReference}>
                                    <!-- Regular Field - Plain Text -->
                                    <td key={column.apiName} title={getCellValue(row, column.apiName)}>
                                        <template if:true={getCellValue(row, column.apiName)}>
                                            {getCellValue(row, column.apiName)}
                                        </template>
                                        <template if:false={getCellValue(row, column.apiName)}>-</template>
                                    </td>
                                </template>
                            </template>

                        </tr>
                    </template>

                    <!-- Totals Row - DYNAMIC -->
                    <tr class="totals-row">
                        <!-- Serial Number Cell (Empty) -->
                        <td></td>
                        
                        <!-- Subtotal Label in First Column -->
                        <template if:true={columns}>
                            <td title="Subtotals"><b>Subtotals</b></td>
                            
                            <!-- Remaining Columns - Show Totals Only if Summable -->
                            <template for:each={columns} for:item="column" for:index="colIndex">
                                <template if:true={column.isSummable}>
                                    <td key={column.apiName} title={totals[column.apiName]}>
                                        <b>{totals[column.apiName]}</b>
                                    </td>
                                </template>
                                <template if:false={column.isSummable}>
                                    <td key={column.apiName}></td>
                                </template>
                            </template>
                        </template>
                    </tr>

                </tbody>
            </table>
        </div>

    </lightning-card>
</template>
