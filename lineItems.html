<template>
    <lightning-card>

        <!-- Header -->
        <div class="slds-p-around_small">
            <div class="slds-text-heading_small">
                <b>Line Items</b>
            </div>
            <div class="slds-m-vertical_small">
                {totalLineItems} items
            </div>
        </div>

        <!-- Table Wrapper -->
        <div class="table-wrapper">
            <table class="resizable-table" data-id="mainTable">

                <!-- ═══════════════════════════════════════════
                     COLGROUP — one <col> per column (dynamic)
                     Driven by columnDefs so resize handles
                     always match the actual column count.
                ════════════════════════════════════════════ -->
                <colgroup>
                    <template for:each={columnDefs} for:item="col">
                        <col key={col.colIndex}
                             data-col={col.colIndex}
                             style="width: 120px" />
                    </template>
                </colgroup>

                <!-- ═══════════════════════════════════════════
                     THEAD — dynamic headers from columnDefs
                     Only columns returned by getFieldSetFields
                     (+ fixed #, Line Item ID) appear here.
                ════════════════════════════════════════════ -->
                <thead>
                    <tr class="slds-line-height_reset">
                        <template for:each={columnDefs} for:item="col">
                            <th key={col.colIndex}
                                scope="col"
                                data-col-index={col.colIndex}>
                                <div class="th-content" title={col.label}>{col.label}</div>
                                <div class="col-resizer" data-col-index={col.colIndex}></div>
                            </th>
                        </template>
                    </tr>
                </thead>

                <tbody>

                    <!-- ═══════════════════════════════════════
                         DATA ROWS — each row's cells array
                         was pre-resolved in JS (_buildRowCells)
                         so HTML just iterates without any
                         dynamic property access.
                    ════════════════════════════════════════ -->
                    <template for:each={tableData} for:item="row">
                        <tr key={row.id} class="slds-hint-parent">
                            <template for:each={row.cells} for:item="cell">
                                <td key={cell.key} title={cell.display}>
                                    <template if:true={cell.isLink}>
                                        <a href={cell.href} target="_blank">{cell.display}</a>
                                    </template>
                                    <template if:false={cell.isLink}>
                                        {cell.display}
                                    </template>
                                </td>
                            </template>
                        </tr>
                    </template>

                    <!-- ═══════════════════════════════════════
                         TOTALS ROW — only shows a value for
                         columns that have a totalKey defined
                         in FIELD_META. Other cells are blank.
                         Second cell always shows "Subtotals".
                    ════════════════════════════════════════ -->
                    <tr class="totals-row">
                        <template for:each={totalCells} for:item="cell">
                            <td key={cell.key}>
                                <template if:true={cell.isLabel}>
                                    <b>Subtotals</b>
                                </template>
                                <template if:true={cell.hasTotal}>
                                    <b>{cell.value}</b>
                                </template>
                            </td>
                        </template>
                    </tr>

                </tbody>
            </table>
        </div>

    </lightning-card>
</template>
